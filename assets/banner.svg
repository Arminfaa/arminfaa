<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none" role="img" aria-label="Armin Fatehi  Frontend Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07090C"/>
      <stop offset="0.55" stop-color="#0B0F14"/>
      <stop offset="1" stop-color="#0A0E12"/>
    </linearGradient>
    <linearGradient id="glow" x1="200" y1="40" x2="980" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#64748B" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#94A3B8" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 90) rotate(90) scale(220 180)">
      <stop stop-color="#3B82F6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 280) rotate(90) scale(260 160)">
      <stop stop-color="#94A3B8" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#94A3B8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>
  <circle cx="980" cy="90" r="220" fill="url(#orb)"/>
  <circle cx="180" cy="280" r="220" fill="url(#orb2)"/>

  <!-- subtle grid -->
  <g opacity="0.08" stroke="#94A3B8" stroke-width="1">
    <path d="M0 72H1200M0 144H1200M0 216H1200M0 288H1200"/>
    <path d="M150 0V360M300 0V360M450 0V360M600 0V360M750 0V360M900 0V360M1050 0V360"/>
  </g>

  <!-- top accent line -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#line)"/>

  <!-- label -->
  <text x="80" y="108" fill="#94A3B8" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="15" letter-spacing="4.5" font-weight="500">FRONTEND ENGINEER</text>

  <!-- name -->
  <text x="80" y="178" fill="#F8FAFC" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="700" letter-spacing="-1.5">Armin Fatehi</text>

  <!-- tagline -->
  <text x="80" y="228" fill="#CBD5E1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="400">Building production-ready products with React, Next.js &amp; TypeScript</text>

  <!-- chips -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#E2E8F0">
    <rect x="80" y="268" width="118" height="32" rx="8" fill="#111827" stroke="#1F2937"/>
    <text x="99" y="289">6+ Years</text>

    <rect x="210" y="268" width="168" height="32" rx="8" fill="#111827" stroke="#1F2937"/>
    <text x="229" y="289">SaaS &amp; Enterprise</text>

    <rect x="390" y="268" width="178" height="32" rx="8" fill="#111827" stroke="#1F2937"/>
    <text x="409" y="289">Scalable Systems</text>
  </g>

  <!-- bottom accent line -->
  <rect x="0" y="359" width="1200" height="1" fill="url(#line)"/>
</svg>

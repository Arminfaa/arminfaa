<svg xmlns="http://www.w3.org/2000/svg" width="360" height="220" viewBox="0 0 360 220" fill="none">
  <rect width="360" height="220" rx="8" fill="#1A1B27"/>
  <rect x="0.5" y="0.5" width="359" height="219" rx="8" stroke="#2A2B3A"/>

  <text x="24" y="36" fill="#70A5FD" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="600">Top Languages</text>

  <!-- legend -->
  <rect x="24" y="62" width="10" height="10" rx="2" fill="#3178C6"/>
  <text x="42" y="72" fill="#A9B1D6" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">TypeScript</text>
  <text x="150" y="72" fill="#C0CAF5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">66.2%</text>

  <rect x="24" y="90" width="10" height="10" rx="2" fill="#F1E05A"/>
  <text x="42" y="100" fill="#A9B1D6" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">JavaScript</text>
  <text x="150" y="100" fill="#C0CAF5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">31.7%</text>

  <rect x="24" y="118" width="10" height="10" rx="2" fill="#563D7C"/>
  <text x="42" y="128" fill="#A9B1D6" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">CSS</text>
  <text x="150" y="128" fill="#C0CAF5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">2.0%</text>

  <rect x="24" y="146" width="10" height="10" rx="2" fill="#E34C26"/>
  <text x="42" y="156" fill="#A9B1D6" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">HTML</text>
  <text x="150" y="156" fill="#C0CAF5" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13" font-weight="600">0.1%</text>

  <!-- donut: TS 66.2%, JS 31.7%, CSS 2%, HTML ~0 -->
  <!-- circumference approx 2*pi*48 = 301.6 -->
  <circle cx="280" cy="120" r="48" fill="none" stroke="#2A2B3A" stroke-width="18"/>
  <circle cx="280" cy="120" r="48" fill="none" stroke="#3178C6" stroke-width="18"
    stroke-dasharray="199.7 301.6" stroke-dashoffset="75.4" transform="rotate(-90 280 120)"/>
  <circle cx="280" cy="120" r="48" fill="none" stroke="#F1E05A" stroke-width="18"
    stroke-dasharray="95.6 301.6" stroke-dashoffset="-124.3" transform="rotate(-90 280 120)"/>
  <circle cx="280" cy="120" r="48" fill="none" stroke="#563D7C" stroke-width="18"
    stroke-dasharray="6.0 301.6" stroke-dashoffset="-219.9" transform="rotate(-90 280 120)"/>

  <text x="24" y="198" fill="#565F89" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Based on featured production repositories</text>
</svg>
